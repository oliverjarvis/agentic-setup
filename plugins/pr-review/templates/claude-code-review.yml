name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Least-privilege permissions for a review job.
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    # Same-repo PRs only by default. Fork PRs run untrusted code and must not
    # reach repo secrets. Read "Reviewing fork PRs" in the pr-review plugin
    # README before relaxing this guard.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to full commit SHAs (supply-chain hardening).
      # Refresh deliberately; do not float to a moving tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1
        with:
          # Direct Claude API key. Alternatives (see plugin README):
          #   claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}  # Pro/Max
          #   use_bedrock / use_vertex via OIDC (no static key)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/anthropics/claude-code.git
          plugins: code-review@claude-code-plugins
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
